version: '3.8'

services:
  web:
    image: marcocampisi02/swingsubsonic-music:latest
    container_name: swingsubsonic-music
    ports:
      - "1970:80"
    restart: unless-stopped

  navidrome:
    image: deluan/navidrome:latest
    container_name: navidrome
    ports:
      - "4533:4533"
    environment:
      - ND_LOGLEVEL=info
      - ND_SESSIONTIMEOUT=24h
    volumes:
      - /media/sda1/media/navidrome:/data  # Where Navidrome saves the DB on your server
      - /media/sda1/media/musica:/music:ro  # Link to your music files
    restart: unless-stopped
